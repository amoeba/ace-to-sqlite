name: Deploy to Dokku (manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      dokku_branch:
        description: Dokku branch to push to
        required: false
        default: main

concurrency:
  group: dokku-deploy
  cancel-in-progress: false

jobs:
  deploy_to_dokku:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - name: Push to Dokku
        uses: dokku/github-action@v1.10.0
        with:
          git_remote_url: 'ssh://dokku@${{ secrets.DOKKU_HOST }}/${{ secrets.DOKKU_APP_NAME }}'
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          branch: ${{ inputs.dokku_branch }}
